body:
  text: 道藏經目録卷之一洞真部本文類天字號計十卷靈寶無量度人上品妙經卷一之十地字號計十卷靈寶無量度人上品妙經卷十一之二十玄字號計十卷靈寶無量度人上品妙經卷二十一之三十黃字號計十卷靈寶無量度人上品妙經卷三十一之四十字字號計十卷靈寶無量度人上品妙經卷四十一之五十宙字號計十卷靈寶元量度人上品妙經卷五十一之六十洪字號計十七卷靈寶無量度人上品妙經卷六十一靈寶度人經直音一卷元始説先天道德經注解卷一之五無上內袐真藏經卷一之十荒字號計十卷太上無極總真文昌大洞仙經卷一之五共四卷上清大洞真經卷一之六有符緣日字號計八卷大洞玉經二卷有符太上三十六部尊經共六卷月字號計十卷太上一乘海空智藏經卷一之十盈字號計十二卷髙上玉皇本行集經三卷髙上玉皇本行集經三卷天極上相校本高上玉皇本行經髓髙上玉皇心印妙經高上玉皇胎息經與經髓心叩三經同卷無上九霄玉清太梵紫微玄部雷霆玉經一卷有符九天應元雷聲普化天尊玉樞寶經一卷太上説朝天謝雷真經一卷有符太上虛皇天尊四十九章經一卷太上升玄消災護命妙經三光注齡資福延壽妙經太上長生延壽集福德經與消災資福三經門卷吳字號計十一卷元始五老赤書玉篇真文天書經三卷有符太上諸天靈書度命妙經一卷元始天尊説生天得道經元始天尊説得道了身經生天二經同卷太上九天延祥滌厄四聖妙經一卷有符元始天尊説北方真武妙經一卷元始天尊説梓潼帝君應驗經元始天尊説梓橦帝君本願經與應驗二經同卷元始八威龍文經黃帝隂符經混元陽符經與龍文隂符三經同卷上清黃氣陽精一一一道順行經一卷有符太上開明天地本真經太上玄都妙本清靜身心經與本真二經同卷辰字號計十卷太上太玄女青三元品誠拔罪妙經三卷元始天尊説變化空洞妙經一卷太上升玄三一融神變桄妙經上下同卷太上擊引三光九變妙經有符大上導引三光寶真妙經與九變二經同卷太上修真體元妙道經一卷王清元始玄黃九光真經元始天尊説十一矅大消災神呪經太上洞真五星祕授經玉清無上靈寶自然北斗本生真經太一元真保命長生經太上元始天尊證果真經元始天尊説續命鑠妙與九光等七經同卷洞真太極北帝紫微神呪妙經太上説六甲直符保胎護命妙經與紫微二經同卷有符太上元始天尊説大兩龍王經太上護國祈兩消魔經太上洞淵北帝天蓬護命消災神呪經太上洞淵辭瘟神悅妙經與大兩龍王等四經同卷宿字號計十卷高上太霄琅書瓊文帝章經一卷有符太上玉珮金璫太極金書上經一卷有符上方天尊説真元通仙道經一卷有符無上太乘要訣妙經一卷元始洞真決疑經元始天尊説玄微妙經與決疑二經同卷太上洞真賢門一卷元始天王歡樂經一卷玊淸胎元內飬真經玉清無上內景真經太上真一報父母恩重經元始洞真慈善孝子報恩成道經太上元始天尊説消殄蟲蝗經太上安鎮九蠱龍柟紗鱖太上洞真安灶經太上元始天尊説金光明經元始天尊説三官寶號經與內養等九經同卷元始天尊濟度血湖真經上中下天始天尊説酆都滅罪經太上説九幽拔罪心印妙經元始天尊説甘露升天神呪妙經元始説功德法食往生經與血湖等五經同卷太上玉華洞章拔亡度世升仙妙經一卷列字號計十二卷太上三洞神呪卷一之十二神符類張字號計八卷三洞神符記雲籙度人妙經洞真太微黃書天帝君石景金陽素經上清洞真元經五籍符白羽黑翮靈飛玉符上清瓊宮靈飛六甲左右上符太上洞真經洞章符太上祕法鎮宅靈符玉訣類寒字號計四卷度人上品妙經四注卷一之四嚴東薛幽棲李少徼成玄英來字號計七卷度人上品妙經注三卷青元真人度人上品妙經通義卷一之四有圖暑字號計五卷度人上品妙經內義卷一之五有圖蕭應往字號計六卷度人上品妙經注三卷上陽子度人上品妙經注三卷薛季秋字號計八卷度人上品經法卷一之五有圖像陳樁榮度人經大梵隱語疏義一卷無量度人經訣音義一卷真藏經要訣一卷收字號計九卷太上靈寶諸天內音自然玉字卷一之四有符諸天靈書度命妙經義疏一卷雷霆玉樞寶經集注二卷白玉蝗大上升玄消災護命妙經注一卷混然子太上升玄消災護命妙經注李道純元始天尊説太古經注與護命二經同卷混然子冬字號計七卷玉清無極總真文昌大洞仙經注卷一之七有圖衡琪藏字號計九卷玉清無極總真文昌大洞仙經注卷八之十上清大洞真經玉訣音義一卷太上大通經注李道純太上赤文洞古經注長答子旡上赤文洞古經注與大通三經同卷李道純黃帝隂符經集注伊尹太公范嚴鬼谷子諸葛亮張良黃帝隂符經講義卷一之四共三卷夏宋禹閏字號計十卷黃帝隂符經疏三卷李荃黃帝隂符經集解上中下同卷赤松子等注黃帝隂符經注一卷張果黃帝隂符經解一卷禺辰黃帝隂符經注解一卷任照一黃帝隂符經注一卷黃真黃帝隂符經注沈亞夫黃帝隂符經注蔡氏典沈亞夫注同卷黃帝隂符經解義一卷蕭真寧餘字號計十一卷隂符經三皇玉訣上中下共二卷黃帝隂符經心法上中下同卷元一黃帝隂符經注二卷唐淳黃帝隂符經注一卷劉處玄黃帝隂符經注一卷訣翼黃帝隂符經注解一卷鄉訴黃帝隂符經注一卷俞瓊黃帝隂符夾頌解注上中下圖卷五道淵黃帝隂符經集解上中下同卷素淑真咸字號計十卷太上求仙定録尺素真訣玉文一卷太霄琅書瓊文帝章訣一卷胎息經注幻真光生胎息祕要歌訣太清真人絡命訣與胎息等五經同卷太上洞房內經注隂真君還丹歌注與內經同卷十一陳搏崔公入藥鏡注解一卷吕純陽真人沁園春丹詞注解一卷青天歌喻俞瓊學仙辨真訣太上洞真凝神修行經訣與辨真洞卷上清握中訣三卷中卷有符歲字號計八卷紫陽真人悟真篇注疏卷一之八翁籙光連靈戴起宗律字號計七卷悟真篇三注卷一之五紫陽真人悟真直指詳説三乘祕要一卷紫陽真人悟真篇拾還一卷吕字號計十卷悟真篇注釋三卷無名子悟真篇講義卷一之七夏宗禹靈圖類調字號計十卷靈寶無量度人上品妙經符圖五卷度人上品妙經旁通圖中下同卷上卷原缺修真太極混元圖修真太極混元指玄圖與混無圖同卷金液還丹印證圖一卷修真歷驗鈔圖一卷龍虎手鑑圖一卷上清太玄九陽圖一卷三才定位圖上清洞真九宮紫房圖與定位圖同卷陽字號計六卷周易圖上中下三卷大易象數鉤深圖二卷雲字號計十一卷易數鉤隱圖三卷易數鉤隱圖遺論九事一卷易象圖説內篇三卷易象圖説外篇三卷玄元十子圖一卷譜録類騰字號計十卷上清三尊譜録一卷靈寶自然九天生神三寶大有金書一卷元始上真衆仙記一卷洞玄靈寶真靈位業圖一卷元始高上玉檢大録一卷清河內傳一卷梓潼帝君化書卷一之四致字號計十一卷清微仙譜一卷三茅真君加封事典二卷命蓮正宗記卷一之五金蓮正宗仙源像傳一卷七真年譜一卷玄風慶會録一卷戒律類雨字號計十二卷太上洞真智慧上品大誡一卷三洞衆戒文上卞同卷太微靈書紫文仙忌真記上經虛皇天尊初真十戒文太上九真妙戒金籙度命拔罪妙經與真記等三解同卷太上十二上品飛天法輪勸誡妙經太極真人説二十四門戒經與勸誠二經同卷太真玉帝四極明科經卷一之五第五卷有符赤松子中誡經一卷太微仙君功過格太清五十八願文與功過格同卷玄都律文一卷威儀類露字號計十卷太上靈寶朝天謝罪大懴卷一之十結字號計十卷太上玉清謝罪登真寶懺一卷太上上清禳災延壽寶懺一卷太上太清拔罪升天寶懺一卷玉皇宥罪錫福寶懺一卷高上玉皇滿願寶懺卷一之十共五卷九天應元雷聲普化天尊玉樞寶懺雷霆玉樞宥罪法懺與玉樞懴同卷為字號計十一卷玉皇十七慈光燈儀一卷上清十一大曜燈儀南斗延壽燈儀北斗七元星燈儀北斗本命延壽燈儀與十一曜等四儀同卷三官燈儀玄帝燈儀九天三茅司命仙燈儀萬靈燈儀五顯靈觀大帝燈儀與三官等五儀同卷土司燈儀東廚司命燈儀與土司二儀同卷正一瘟司辟毒神燈儀離明瑞象燈儀與瘟司二儀同卷黃籙九陽梵氣燈儀黃籙九巵燈儀與九陽二儀同卷黃籙破獄燈儀黃籙五苦輪燈儀與破二儀同卷地府十王拔度儀一卷上清天寶齋初夜儀一卷太乙火府奏告祈禳儀一十五卷清微玄樞奏告儀一卷方法類霜字號計九卷靈寶度人上經大法卷一之十金字號計十卷靈寶度人上經大法卷十一之二十生字號計十卷靈寶度人上經大法卷二十一之三十麗字號計十卷靈寶度人上經大法卷三十一之四十水字號計十一卷靈寶度人上經大法卷四十一之五十二玉字號計十二卷靈寶度人上經大法卷五十三之六十四出字號計八卷靈寶度人上經大法卷六十五之七十二昆字號計十一卷無上三天玉堂大法卷一之十五岡字號計十卷無上三天玉堂大法卷十六之二十五劔字號計八卷無上三天玉堂大法卷二十六之三十共四卷無上三天玉堂正宗高奔內景王書二卷清微神烈祕法二卷號字號計十卷清微元降太法卷一七十巨字號計十卷清微元降太法卷十一之二十闕字號計七卷清微元降大法卷二十一之二十五清微齋法二卷珠字號計九卷太上九要心印妙經紫元授道傳心與丸要二經同卷真龍虎九仙經龍虎中丹訣與九仙二經同卷九還七返龍虎金丹析理真訣諸真論還丹訣與析理訣同卷真一命丹訣胎息節要附還丹祕訣養赤子神方與金丹訣同卷還丹衆仙論一卷修丹妙用至理論一卷丹經極論金晶論與丹論四卷還丹顯妙通幽集一卷元陽子金液集還丹金液歌注與金流集同卷元陽子稱字號計十卷玉清金筍青華祕文金寶內錬丹訣三卷有圖傳張紫陽碧虛子親傳直指紙舟先生金真直指與親傳直指同卷陳虛白規中指南上下同卷有圖大丹直指二卷有圖玉溪子丹經指要三卷有圖夜字號計十三卷西山羣仙會真記卷一之五會真集卷一之五有圖啓真集三卷通玄子光字號計十卷中和集卷一之六有圖李清卷三天易髓一卷李清菴全真集玄祕要一卷李清菴谷神篇二卷有圖玄巢子果字號計十卷金闕帝君三元真一經一卷大洞金華玉經一卷有圖太微靈書紫文琅玗華丹神真上經一卷玉景九天金霄威神王祝太元上經一卷有符洞真太微黃書九天八籙真文一卷有符太玄八景籙一卷有符陶真人內丹賦一卷擒玄賦一卷金丹賦一卷谷神賦一卷珍字號計十一卷修真十書卷一之十三有圖李字號計九卷修真十書卷十四之二十七有圖二奈字號計十二卷修真十書卷二十八之四十一萊字號計十一卷修真十書卷四十二之五十五重字號計九卷修真十書卷五十六之六十共四卷真氣還九銘一卷還丹歌訣上下同卷金液還丹百問訣一卷上乘修真三要上下同卷有圖像乾元子三始論至真子龍虎大丹詩與三始論同卷衆術類芥字號計十卷破迷正道歌一卷太玄朗然子進道詩了明篇與追道詩同卷宋先生明道篇一卷景陽子真仙祕傳火候法一卷有圖三極至命筌蹄一卷有圖折疑指迷論一卷修真精義雜論一卷有圖清微丹訣一卷有圖先天金丹大道玄奧口訣有圖像金液大丹口訣與玄奧口訣同卷抱一子三峯老人丹訣一薑字號計九卷黃帝宅經二卷黃帝龍首經二卷黃帝金匱玉