body:
  text: 道藏經目録卷之二洞玄部本文類人字號計十四卷靈寳天尊說洞恩靈濟真君妙經一卷洞玄靈寳自然九天生神章經一卷洞玄靈寶本相運度劫期經一卷洞玄靈寳丹水飛術運度小劫妙經一卷洞玄靈寳諸天世界造化經一卷太上靈寳天地運度自然妙經一卷太上洞玄靈寳三元无量壽經一卷上清五常變通萬化鬱㝠經一卷有符太上洞玄靈寳智慧定志通微經一卷有圖太上洞玄靈寳觀妙經太上洞玄靈寳天尊說大通經太上洞玄靈寳護諸童子經與觀妙等三經同卷太上洞玄靈寶開演秘宻藏經一卷太上洞玄靈寳真文要解上經一卷太上黄庭内景玉經太上黄庭外景玉經與内景二經同卷靈寳天尊說禄庫受生經一卷皇字號計十卷太上靈寶元陽妙經卷一之十始字號計十卷太上洞淵神呪經卷一之十制字號計十卷太上洞淵神呪經卷十一之二十文字號計十卷太上洞玄靈寶常報因縁經卷一之十字字號計十卷太上洞玄靈寳十號功德因緣妙經一卷太上洞玄靈寳宿命因縁明經一卷太上洞玄靈寳岀家因縁經一卷太上洞玄靈寳轉神度命經一卷太上洞玄靈寳十師度人妙經一卷太上洞玄靈寳太玄會慈勸世經太上洞玄靈寳四方大經經與勸世二經同卷太上洞玄靈寳智慧本願大戒上品經一卷太上洞玄靈靈誡業本行上品妙經一卷太上洞玄靈寳真一勸誡法輪妙經太上玄一真人說妙通轉神入定經太上玄一真人說勸誠法論妙經與真一等三經同卷太上洞玄靈寳法燭經太上靈寳智慧觀身經太一救苦護身妙經與法燭等三經同卷乃字號計十一卷太上洞玄靈寳赤書玉訣妙經二卷上清金匱玉鏡絛真指玄妙經一卷有符上清三元玉檢三元布經一卷有符太上洞玄靈寶福日妙經洞玄靈寳上師說救護身命經與福日二經同卷太上靈寳天尊說禳災度厄經太上神呪延夀妙經太上洞玄靈寳消禳火災經太上洞玄靈寳天尊說養蠶營種經與禳災等四經同卷太上洞玄靈寳八威召龍妙經二卷太上洞淵說請兩龍王經太上召諸神龍安鎮墳墓經太上靈寳補謝竈王經太上說利益蠶王妙經太上說牛癀妙經與龍王等五經同卷上清洞玄明燈上經一卷太上洞玄寳元上經一卷服字號計九卷太上洞玄靈寳滅度五錬生尸妙經一卷有符太上洞玄靈寶三元玉京玄都大獻經一卷太上洞玄靈寳三塗五苦拔度生死妙經太上道君說解寃拔度妙經太上洞玄靈寳徃生救苦妙經與拔度等三經同卷太上洞玄靈寳救苦妙經太上洞玄靈寳天尊說濟苦經太上洞玄靈寳淨供妙經與救苦等三經同卷太上靈寳洪福滅罪像名經一卷太上救苦天尊說消愆滅罪經太上說酆都拔苦愈樂妙經洞玄靈寳道要經與滅罪等三經同卷洞玄靈寳飛仙上品妙經太上靈寳天尊說延壽妙經太上七星神呪經太上虛皇保生神呪經與飛仙等四經同卷太上洞玄三洞開天風雷禹步制魔神呪經太上洞淵三昧帝心光明正印太極紫微伏魔制鬼拯救惡道集福吉祥神呪與制魔二經同卷太上二生解寃妙經一卷有符神符類衣字號計十卷太上靈寳五符三卷太上洞玄靈寳素靈真符三卷太上洞玄靈寳五嶽神符一卷上清金母求仙上法一卷上清豁落七元符太上洞玄靈寶大綱鈔上清太一金闕玉璽金真紀與七元等三篇同卷太上洞玄靈寶投簡符文要訣一卷玉訣類裳字號計七卷太上洞玄靈寳自然九天生神玉章經解義四卷薑思靖太上洞玄靈寳自然九天生神玉章經解三王希巢推字號計十卷太上洞玄靈寶自然九天生神玉章經註三卷華陽復太上洞玄靈寶天尊說救苦妙經註一卷洞玄靈寳定觀經註一卷黃庭內景玉經註一卷劉先生黄庭内景玉經註三卷梁丘子黄庭內外玉景經一卷原不全蔣慎修位字號計九卷上清丹元玉真帝皇飛仙上經上清紫精君皇初紫靈道君洞房上經與飛仙二經同卷上清紫微帝君南極元君玉經寶訣靈寳大錬內㫖行持機要與玉經二經同卷上清胎精記解結行事訣上清華晨三奔玉訣與行事訣同卷太上洞玄靈寳衆簡文有符太上洞玄靈寳五帝醮祭招真玉訣與衆簡文同卷上清佩符文青劵訣上清佩符文白劵訣上清佩符文絳劵訣上清佩符文黑劵訣上清佩符文黃券訣與青劵等五劵同卷太上大道三元品誡謝罪上經一卷固氣還神九轉瓊丹論一卷靈寳衆真丹訣一卷神仙服餌丹石行藥法一卷遜字號計十卷登真隱訣三卷上清三真㫖要玉訣一卷上清洞真解過訣一卷上清明堂元真經訣一卷上清太極隱註玉經寳訣一卷上清太上八素真經一卷上清修行經訣一卷太上飛行九晨玉經一卷靈圗類國字號計十一卷上清長生寳鑑圗一卷上清八道祕言圗一卷上清舍象劒鑑圗一卷黃庭内景五臟六腑補瀉圗一卷七域修真證品圗玄覽人鳥山經圗與證品圖同卷太上玉晨鬰儀結璘奔日月圗一卷上方大洞真元妙經品有符上方大洞真元妙經圗與真元經品同卷上方大洞真元隂陽陟降圗書後解上方大洞真元圗書繼說終篇與陟降圖同卷許太史真君圗傳二卷洞玄靈寳五嶽古本真形圗一卷譜録類有字號計十卷上清後聖道君列紀上清髙上玉真衆道綜監寶諱有符與列紀同卷洞玄靈寳三師記靈寳三師名諱形狀居觀方所文興三師記同卷上清衆經諸真聖祕八卷有符虞字號計八卷許真君仙傳一卷許真君八十五化録三卷孝道呉許二真君傳一卷太極葛仙翁傳一卷雲阜山申仙翁傳一卷南嶽九真人傳南嶽小録與九真人傳同卷戒律類陶字號計十卷太上洞玄靈寳上品戒經太上玄一真人說三途五苦勸誡經與上品二經同卷太上洞玄靈寳三元品戒功德輕重經一卷太上洞玄靈寳智慧罪根上品太戒經二卷上清衆真教戒