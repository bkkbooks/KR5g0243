body:
  text: 道藏經目録卷之四太玄部取字號計十卷玄精碧匣靈寶聚玄經三卷太上洞玄靈寳三一五氣真經太上清靜玉字妙經洞玄靈寳天關經與五氣等三經同卷上清無英真章合遊內變玉經上清神寳洞房真諱上經靈寳九真人五復三歸行道觀門經與内變等三經同卷太上長文大洞靈寳幽玄上品妙經太上長文大洞靈寳幽玄上品妙經發揮上清祕道九精廻曜合神上真玉經上清太淵神龍瓊胎乗景上玄玉章有符與玉經同卷淵源道妙洞真繼篇上中下共二卷映字號計十卷古文龍虎經註䟽三卷有圖古文龍虎上經註周易參同契註三卷隂真人周易參同契註三卷無名氏容字號計八卷周易參同契註上中下共二品朱文公周易參同契分章通真義三卷彭堯周易參同契鼎器歌明鏡圖有圕周易參同契註二卷無名氏止字號計十卷周易參同契發揮卷一之九俱有圖周易參同契釋疑金陽子若字號計十四卷周易參同契解三卷抱一子周易參同契註三卷諸華谷易外別傳一卷全陽子易筮蠟發三卷當思齊易圖通變卷一之五共四卷思字號計九卷金鎖流珠引卷一之十有符圖言字號計十卷金鍞流珠引卷十一之二十有符圖辭字號計九卷金鎖流珠引卷二十一之二十九安字號計十卷真誥卷一之十卷九有符定字號計十卷真誥卷十一之二十篤字號計十一卷道樞卷一之十二初字號計十二卷道樞卷十三之二十四誠字號計九卷道樞卷二十五之三十三羙字號計九卷道樞卷三十四之四十二慎字號計十二卷黄帝內經素問卷一之十四终字號計十卷黃帝内經素問卷十五之二十四宜字號計十一卷黃帝内經素問卷二十五之三十五令字號計七卷黄帝內經素問卷三十六之四十二榮字號計八卷黃帝内經素問卷四十三之五十業字號計十三卷黄帝内經靈樞略一卷黄帝素問靈樞集註卷一之十九共十二卷所字號計九卷黄帝素問靈樞集註卷二十之二十三共二卷黄帝内經素問遺篇卷一之五共四卷素問入式運氣論奧三卷基字號計十三卷素問六氣玄珠宻語卷一之十七共十三卷籍字號計七卷黃帝八十一難經卷一之七甚字號計八卷鬼谷子三卷天隱子素履子三卷與天隱子同卷無能子三卷玄真子外篇上中下同卷無字號計十卷劉子卷一之十竟字號計十卷山海經卷一之十八共十卷原缺十四十五學字號計十卷雲笈七籖卷一之十優字號計十卷雲笈七籤卷十一之二十登字號計十卷雲笈七籖卷二十一之三十仕字號計十卷雲笈七籖卷三十一之四十攝字號計十卷雲笈七籤卷四十一之五十職字號計十卷雲笈七籖卷玉十一之六十從字號計十卷雲笈七籖卷六十一之七十政字號計九卷雲笈七籖卷七十一之七十九存字號計十一卷雲笈七籖卷八十之九十以字號計十卷雲笈七籤卷九十一之一百甘字號計十卷雲笈七籤卷一百一之一百一十棠字號計十三卷雲笈七籖卷一百十一之一百二十二去字號計十卷至言總卷一之五太玄寳典上中下同卷道體論一卷坐忘論一卷大道論一卷心目論三論元㫖與心目論同卷而字號計六卷皇極經世卷一上中下卷二上中下益字號計六卷皇極經世卷三上中下卷四上中下詠字號計六卷皇極經世卷五上中下卷六上中下欒字號計六卷皇極經世卷七上中下卷八上中下殊字號計六卷皇極經世卷九上中下卷十上中下貴字號計六卷皇極經世卷十一上下卷十二上下靈棋經上下一卷賤字號計十卷擊壤集卷一之十禮字號計十卷擊壤集卷十一之二十别字號計九卷太上修真玄章化書卷一之六共三卷海客論一卷悟玄篇有圖太虛心淵篇與悟玄篇同卷玄珠録二卷雲宫法語二卷尊字號計八卷華陽陶隱居集二卷宗玄先生文集三卷宗玄先生玄綱論南統内丹九章經與玄綱論同卷純陽真人渾成集二卷卑字號計十卷晉真人語録一卷丹陽真人語録一卷長生真人至真語録一卷盤山真人語録一卷瑩蟾子語録卷一之六有圖上字號計十卷上清太玄集卷一之十和字號計九卷洞淵集卷一之九共四卷洞淵集卷一之五長筌子下字號計九卷玄教大公案二卷玄宗直指萬法同歸卷一之七有圖睦字號計十卷上陽子金丹大要卷一之十四共十卷夫字號計十二卷上陽子金丹大要卷十五之十六上陽子金丹大要圖一卷上陽子金丹大要列仙誌一卷上陽子金丹大要仙泒一卷原陽子法語二卷金丹直指一卷周无所道禪集一卷還真集三卷有圖唱字號計十卷道玄篇一卷隨機應化録二卷修鍊須知一卷玉室經金丹歌與玉室經同卷髙象先金丹真一論一卷金丹四百字註一卷龍虎還丹訣頌一卷華陽先生龍虎元㫖龍虎還丹歌訣與元㫖同卷内丹祕訣漁荘邂逅録與内丹祕訣同卷婦字號計九卷金丹正宗還丹復命篇與金丹正宗同卷爰清子至命篇上下同卷有圖翠虛篇一卷還源篇還丹至藥篇亶甲集與還源等三篇同卷金液大丹詩一卷證道歌陳先生内丹訣與證道歌同卷洞元子内丹訣二卷内丹還元訣長生指要與還元訣二篇同卷回陽子隨字號計九卷鳴鶴餘音卷一之九太平部外字號計十卷太平經卷一之十内缺十一之三十四受字號計十卷太平經卷三十五之五十内缺三十八傅字號計十卷太平經卷五十一之九十内缺五十二五十六之六十四七十三七八十五八十七訓字號計十三卷太平經卷九十一之一百七内缺九十四九十五入字號計十一卷太平經卷一百八之一百一十九内缺一百一十五太平經聖君祕㫖奉字號計九卷太上靈寳淨明洞神上品經二卷太上靈寳淨明玉真樞真經太上靈寳淨明道元正印經太上靈寳淨明天尊說禦瘟經有符太上靈寳首入淨明四䂓明鑑經與樞真四經同卷太上靈寳淨明九仙水經有圖太土靈寳淨明中黄八柱經與九仙水經同卷淨明忠孝全書卷一之六共五卷毋字號計十卷太玄真一本際妙經一卷太上洞玄靈寳八仙王教誡經太上洞玄靈寳國王行道經與教誡經同卷太上洞玄靈寳本行宿縁經太上洞玄靈寳本行因縁經與宿綠經同卷洞玄靈寶真人問疾巠一經卷太極左仙公說神符經洞玄靈寳飛行三界通微内思妙經與神符經同卷靈寳玄一真人說生死輪轉因縁經一卷太上洞玄靈寳中和經一卷洞玄靈寶三十二天尊應號經第十二第二十二甚餘原缺太上靈寳升玄内教經中和品述議䟽一卷儀字號計九卷一切道經音義妙門由起洞玄靈寳玄門大義洞玄靈寳三洞奉道科戒營始卷一之六共四卷洞玄靈寳道學科儀二卷陸先生道門科畧諸字號計九卷道門經法相承次序卷三卷道教義樞卷一之十共六卷内缺弟六姑字號計十一卷道典論卷一之四太上妙法本相論三卷上清道類事相卷一之四伯字號計九卷上方無極至道開化真經三卷上方鈞天演範真經太平兩同書與演範經同卷洞玄靈寳左玄論卷一之四上清太玄鑑誡論一卷叔字號計十卷無上祕要卷三之九卷十五之二十內缺一之二八十之十四猶字號計十二卷無上祕要卷二十一之三十二子字號計九卷無上祕要卷三十三之四十七内缺三十六比字號計九卷無上祕要卷四十八之五十七内缺玉十八五十九兒字號計九卷無上祕要卷六十五之八十八内缺六十之六十四六十七之七十三七十五七十七七㑹九之八十二八个五八十六八十九之九十孔字號計九卷無上袐要卷九十一之一百懷字號計十卷三洞珠囊卷一之十兄字號計八卷雲山集卷一之八弟字號計八卷仙樂集卷一之五漸悟焦二卷草堂集一卷同字號計十卷自然集一卷鳴真集一卷葆光集三卷西雲集三卷勿齋先生文集二卷氣字號計十卷洞玄金玉集卷一之十連字號計七卷丹陽神光燦一卷悟真集二卷雲光集卷一之四枝字號計十卷靈陽金真集卷一之十交字號計九卷重陽全真集卷十一之十三重陽教化集卷一之三重陽分梨十化集上下二卷重陽金關玉鎖訣重陽授丹陽一一十四訣馬自然金丹口訣與玉三訣同卷友字號計十二卷長卷子磻溪集卷一之六譚先生水雲集三卷太古集卷一之四共三卷投字號計七卷孫真人千金方目録二卷孫眞人千金方卷一之五分字號計十一卷孫真人千金方卷六之十九切字號計十一卷孫真人千金方卷二十之三十磨字號計十卷孫眞人千金方卷三十一之四十箴字號計十卷孫真人千金方卷四十一之五十規字號計十卷孫真人千金方卷五十一之六十仁字號計十卷孫真人千金方卷六十一之七十一慈字號計十一卷孫真人千金方卷七十二之八十二隱字號計十一卷孫真人千金方卷八十三之九十三惻字號計十一卷急救仙方卷一之十一有像造字號計十一卷仙傳外科祕方卷一之十一有像次字號計十卷法诲遺珠卷一之十弗字號計十卷法海遺珠卷十一之二十一離字號計十一卷法海遺珠卷二十二之三十三節字號計十三卷法海遺珠卷三十四之四十六太清部義字號計十一卷太上威應篇卷一之十一㢘字號計十二卷太上感應篇卷十二之二十二退字號計十卷太上感應篇卷二十四之三十太上老君中經二卷太上老君清靜心經太上老君說上七滅罪集福妙經與心經同卷顛字號計十二卷鬻子二卷公孫龍子上中下同卷尹丈子上下同卷子華子卷一之十共五卷鶡冠子三卷沛字號計十三卷墨子卷一之十五匪字號計十卷韓非子卷一之十二虧字號計九卷韓非子卷十三之二十黃石公素書一卷號天覺註黃石公素書一卷魏鲁註性字號計八卷孫子卷一之八靜字號計六卷孫子卷九之十三孫子遺說情字號計九卷天原發微卷一七九逸字號計九卷天原發微卷十之十八心字號計六卷太玄經集註卷一之六動字號計十二卷淮南鴻烈解卷一之十四神字號計九卷淮南鴻烈解卷十五之二十三疲字號計八卷淮南鴻烈解卷二十四之二十八抱朴子內篇卷一之六守字號計十一卷抱朴子内篇卷七之三十抱朴子別㫖與内篇同卷真字號計十二卷地朴子外篇卷一之三十七志字號計十二卷抱朴子外篇卷三十八之五十橐籥子一卷隂丹内篇附天機經一卷祕傳正陽真人靈寶畢法三卷正一部滿字號計十卷大惠靜慈妙樂天尊說福德五聖經有符太上正一呪鬼經太上洞玄靈寶羅天大醮上品妙經與五聖等三經同卷老君變化無極經太上金華天尊救刧護命妙經無上三天法師說廕有衆生妙經太上說青玄雷令法行因地妙經與無極等四經同卷上清太霄隱書元真洞飛二景經洞玄靈寳六齋十直聖紀經與二景經同卷道要靈祇神鬼品經一卷洞神八帝元變經一卷有符像太上三天正法經一卷太上正一法文經一卷太上一二天內解經上下同卷上清明鑑要經一卷太上明鑑真經一卷有像逐字號計九卷太上三五正一盟威籙卷一之六太上正一盟威法籙一卷正一法文十籙召儀一卷醮三洞真文五法正一盟威籙立成儀一卷物號計十卷太上玄天真武無上將軍籙一卷高上大洞文昌司禄紫陽寳籙二卷太上北極伏魔神呪殺鬼籙一卷太上正一延生保命籙一卷太上正一解五音呪詛祕籙一卷正一法文經章官品卷一之四意字號計十二卷高上神霄玉清真王紫書大法卷一之十二移字號計九卷道法會元卷一之十二堅字號計十一卷道法會元卷十一之二十三一持字號計十二卷道法會元卷二十四之三十五雅字號計十卷道法會元卷三十六之四十五操字號計十卷道法會元卷四十大之五十五好字號計九