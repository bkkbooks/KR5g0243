body:
  text: 道藏經目録卷之四太玄部取字號計十卷玄精碧匣靈寶聚玄經三卷太上洞玄靈寶三一五氣真經太上清靜玉字妙經洞玄靈寶天關經與五氣等三經同卷上清無英真章合遊內變玉經上清神寶洞房真諱上經靈寶九真人五復三歸行道觀門經與內變等三經同卷太上長文大洞靈寶幽玄上品妙經太上長文大洞靈寶幽玄上品妙經發揮上清祕道九精回曜合神上真玉經上清太淵神龍瓊胎乘景上玄玉章有符與玉經同卷淵源道妙洞真繼篇上中下共二卷映字號計十卷古文龍虎經注疏三卷有圖古文龍虎上經注周易參同契注三卷隂真人周易參同契注三卷無名氏容字號計八卷周易參同契注上中下共二品朱文公周易參同契分章通真義三卷彭堯周易參同契鼎器歌明鏡圖有圖周易參同契注二卷無名氏止字號計十卷周易參同契發揮卷一之九俱有圖周易參同契釋疑金陽子若字號計十四卷周易參同契解三卷抱一子周易參同契注三卷諸華谷易外別傳一卷全陽子易筮蠟發三卷當思齊易圖通變卷一之五共四卷思字號計九卷金鎖流珠引卷一之十有符圖言字號計十卷金鍞流珠引卷十一之二十有符圖辭字號計九卷金鎖流珠引卷二十一之二十九安字號計十卷真誥卷一之十卷九有符定字號計十卷真誥卷十一之二十篤字號計十一卷道樞卷一之十二初字號計十二卷道樞卷十三之二十四誠字號計九卷道樞卷二十五之三十三美字號計九卷道樞卷三十四之四十二慎字號計十二卷黃帝內經素問卷一之十四終字號計十卷黃帝內經素問卷十五之二十四宜字號計十一卷黃帝內經素問卷二十五之三十五令字號計七卷黃帝內經素問卷三十六之四十二榮字號計八卷黃帝內經素問卷四十三之五十業字號計十三卷黃帝內經靈樞略一卷黃帝素問靈樞集注卷一之十九共十二卷所字號計九卷黃帝素問靈樞集注卷二十之二十三共二卷黃帝內經素問遺篇卷一之五共四卷素問入式運氣論奧三卷基字號計十三卷素問六氣玄珠密語卷一之十七共十三卷籍字號計七卷黃帝八十一難經卷一之七甚字號計八卷鬼谷子三卷天隱子素履子三卷與天隱子同卷無能子三卷玄真子外篇上中下同卷無字號計十卷劉子卷一之十竟字號計十卷山海經卷一之十八共十卷原缺十四十五學字號計十卷雲笈七籖卷一之十優字號計十卷雲笈七籤卷十一之二十登字號計十卷雲笈七籖卷二十一之三十仕字號計十卷雲笈七籖卷三十一之四十攝字號計十卷雲笈七籤卷四十一之五十職字號計十卷雲笈七籖卷玉十一之六十從字號計十卷雲笈七籖卷六十一之七十政字號計九卷雲笈七籖卷七十一之七十九存字號計十一卷雲笈七籖卷八十之九十以字號計十卷雲笈七籤卷九十一之一百甘字號計十卷雲笈七籤卷一百一之一百一十棠字號計十三卷雲笈七籖卷一百十一之一百二十二去字號計十卷至言總卷一之五太玄寶典上中下同卷道體論一卷坐忘論一卷大道論一卷心目論三論元㫖與心目論同卷而字號計六卷皇極經世卷一上中下卷二上中下益字號計六卷皇極經世卷三上中下卷四上中下詠字號計六卷皇極經世卷五上中下卷六上中下欒字號計六卷皇極經世卷七上中下卷八上中下殊字號計六卷皇極經世卷九上中下卷十上中下貴字號計六卷皇極經世卷十一上下卷十二上下靈棋經上下一卷賤字號計十卷擊壤集卷一之十禮字號計十卷擊壤集卷十一之二十别字號計九卷太上修真玄章化書卷一之六共三卷海客論一卷悟玄篇有圖太虛心淵篇與悟玄篇同卷玄珠録二卷雲宫法語二卷尊字號計八卷華陽陶隱居集二卷宗玄先生文集三卷宗玄先生玄綱論南統內丹九章經與玄綱論同卷純陽真人渾成集二卷卑字號計十卷晉真人語録一卷丹陽真人語録一卷長生真人至真語録一卷盤山真人語録一卷瑩蟾子語録卷一之六有圖上字號計十卷上清太玄集卷一之十和字號計九卷洞淵集卷一之九共四卷洞淵集卷一之五長筌子下字號計九卷玄教大公案二卷玄宗直指萬法同歸卷一之七有圖睦字號計十卷上陽子金丹大要卷一之十四共十卷夫字號計十二卷上陽子金丹大要卷十五之十六上陽子金丹大要圖一卷上陽子金丹大要列仙志一卷上陽子金丹大要仙泒一卷原陽子法語二卷金丹直指一卷周無所道禪集一卷還真集三卷有圖唱字號計十卷道玄篇一卷隨機應化録二卷修鍊須知一卷玉室經金丹歌與玉室經同卷髙象先金丹真一論一卷金丹四百字注一卷龍虎還丹訣頌一卷華陽先生龍虎元㫖龍虎還丹歌訣與元㫖同卷內丹祕訣漁莊邂逅録與內丹祕訣同卷婦字號計九卷金丹正宗還丹復命篇與金丹正宗同卷爰清子至命篇上下同卷有圖翠虛篇一卷還源篇還丹至藥篇亶甲集與還源等三篇同卷金液大丹詩一卷證道歌陳先生內丹訣與證道歌同卷洞元子內丹訣二卷內丹還元訣長生指要與還元訣二篇同卷回陽子隨字號計九卷鳴鶴餘音卷一之九太平部外字號計十卷太平經卷一之十內缺十一之三十四受字號計十卷太平經卷三十五之五十內缺三十八傅字號計十卷太平經卷五十一之九十內缺五十二五十六之六十四七十三七八十五八十七訓字號計十三卷太平經卷九十一之一百七內缺九十四九十五入字號計十一卷太平經卷一百八之一百一十九內缺一百一十五太平經聖君祕㫖奉字號計九卷太上靈寶淨明洞神上品經二卷太上靈寶淨明玉真樞真經太上靈寶淨明道元正印經太上靈寶淨明天尊說禦瘟經有符太上靈寶首入淨明四規明鑑經與樞