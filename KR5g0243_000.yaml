front:
  text: 凡例一洞真部則無上法王元始天尊所出號洞
  hash: sha256:e4de54c1b4e6f918b1a00701fa9f1faf539473783311a692a641a76a83b387d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0243_HFL_000-001a, image: hfl/1057/1057-014.png}
body:
  text: 真經而為大乘上法乃九聖之道其部分為十二類一曰本文即三元八會之書長行緣起之説為經教之本之例二曰神符即龍章鳯篆之文靈迹符書之字之例三曰玉訣如河上公注釋道德解金書之例四曰靈圖如含景五帝之象圖局三一之形之例五曰譜録如生神章所述三君之本行所陳五帝之示形之例六曰戒律如防止六情十惡之例七曰威儀如齋法典式請經軌儀之例八曰方法如存三守一制魄拘魂䇿役鬼神祈禱雨腸濟幽度顯之例九曰衆術如變丹錬石化形隱景陰陽術數藥餌導養之例十曰記傳如道君本業皇人往行之例十一曰讚頌如九天舊章之例十二曰表奏如六齋啓願三會請謁之例凡係元始天尊流演者各擊於其類其輔則有太玄部一洞玄部則三界醫王太上道君所出號洞玄經而為中乘中法乃九真之道其部亦有十二類與前洞真所部并同凡係太上道君流演者各繫於其類其輔則有太平部一洞神部則十方道師太上老君所出號洞神經而為小乘初法乃九仙之道其部亦有十二類與前洞真所部并同凡係太上老君流演者各繫於其類其輔則有三清部此外又有正一部正一者則通貫巳上洞輔之部歸會于此凡七部故曰三洞四輔凡例終
  hash: sha256:565e842d274a41677f779cad55fb39d1e24bd4d7f99b5a52e8be0b393890b664
