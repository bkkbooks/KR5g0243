body:
  text: 道藏經目録卷之三英三洞神都本文類傷字號計十卷太上老君說常清靜妙經太上玄靈斗姥大聖元君本命延生心經太上玄靈北斗本命延生真經太上玄靈北斗本命長生妙經與清靜等四經同卷太上說南斗六司延壽度人妙經有符太上說東斗主筭護命妙經太上說西斗記名䕶身妙經太上說中斗大魁保命妙經太上說中斗大魁掌筭伏魔神呪經與南斗等五經同卷太上北斗二十八章經一卷太上老君說救生真經太上老君說消災經太上太清天童護命妙經有符太上太清皇老帝君運雷天童隱梵仙經太上老君說安宅八陽經太上老君說補謝八陽經太上說十錬生神救䕶經與救生等七經同卷太上飛步五星經太上飛歩南斗太微玉經與五星二經同卷白王天上清金闕帝君靈書紫文上經一卷有符洞神八帝妙精經一卷有符太上老君内觀經太上老君說了心經太上老君内丹經太上内丹守一真定經太上老君内日用妙經太上老君外日用妙經太上說轉輪五道宿命因縁經與內覲等七經同卷太上化道度世仙經一卷太上老君說天妃救苦靈驗經一卷有符女字號計十五卷太上老君說長生益筭妙經一卷有符太上洞神三元妙本福夀真經太上老君說解釋呪詛經太上老君說五斗金章受生經有符與福壽等三經同卷太上洞神天公消魔護國經上中下太上說紫微神兵護國消魔經與天公二經同卷太上日月混元經太上洞神五星諸宿日月混常經與混元二經同卷太上妙始經太上浩元經與妙始二經同卷混元八景真經卷一之五共四卷老子像名經卷一之十共五卷内缺六之八太上老君說報父母恩重經玄天上帝說報父毋恩重經與恩重二經同卷慕字號計九卷道德真經上下同卷道德經古本篇上下同卷西升經三卷無上妙道文始真經一卷沖虚至徳真經三卷貝字號計六卷洞靈真經一卷南華真經卷一之五神符類潔字號計八卷太上無極大道自然真一五稱符上經二卷太上老君說益筭神符妙經一卷太上老君混元三部符三卷無上三元鎮宅靈籙一卷上清丹天三炁玉皇六辰飛綱司命大籙一卷玉訣類男字號計六卷大明太祖髙皇帝御註道德真經二卷唐玄宗御註道徳真經卷一之四效字號計十卷唐玄宗御製道德真經䟽卷一之十才字號計八卷唐玄宗御製道德真經䟽卷一之四宋徽宗御解道德真經卷一之四良字號計十卷宋徽宗道德真經解義卷一之十知字號計六卷道德真經註卷一之四河上公道德真經解二卷陳象古過字號計十卷道徳真經四子古道集解卷十一之四必字號計八卷道德真經傳卷一之四陸希聲道德真經傳卷一之四吕惠鄉改字號計八卷道徳真經二解卷一之四王賔子道徳真經直解卷一之四本來子得字號計十卷道德真經論卷一之四共二卷司馬氏道德真經註卷一之四王弼道徳真經註卷一之四蘇能字號計十一卷道德真經新註卷一之四李約道德真經指歸卷七之十三內缺一之六嚴君平莫字號計七卷道徳真經䟽義卷一之七江忘字號計七卷道德真經䟽義卷八之十四江罔字號計八卷道德真經集解卷一之四趙學士道德真經金解二卷時雍道德真經次解二卷無名氏談字號計七卷道德真經章句訓頌二卷太玄天師道徳會元二卷李道純道德真經解三卷無名氏彼字號計十卷道德真經口義卷一之四林希𨓜道德玄經原㫖卷一之四杜道堅玄經原㫖發揮二卷杜道堅短字號計八卷道德真經註卷一之四吳澄道德真經集解卷一之四薑思崝靡字號計七卷道德真經集註卷一之七王弼等註恃字號計八卷道德真經集註卷八之十五弼等註道德真經集註卷一之五彭耀纂集已字號計九卷道德真經集註卷六之十四長字號計七卷道德真經集註卷十五之十八道德真經集註釋文一卷道德真經集註雜說二卷信字號計八卷道德真經註䟽卷一之八顏歡使字號計九卷道德真經玄德纂䟽卷一之九可字號計八卷道德真經玄德纂䟽卷十之十七覆字號計九卷道德真經玄德纂䟽卷十八之二十道德真經集義卷一之六器字號計八卷道德真經集義卷七之十道德經論兵要義述卷一之四五真欲字號計八卷道德真經藏室繤微篇卷一之八碧虛子難字號計八卷道德真經藏室纂微篇卷九之十道德真經藏室纂微開題科文䟽卷一之五太霞老人道德真經藏室纂微手鈔卷下原缺上卷量字號計十三卷道徳真經衍義手鈔卷三之十五内缺一之二王守正墨字號計十卷道德真經衍義手鈔卷十六之二十道德真經取善集卷一之五李霖悲字號計十卷道德真經取善集卷六之十二道德真經䟽義卷四之六內缺一之三迶志堅絲字號計十卷道德真經註二卷林志堅道德真經解義卷一之四息齋道德真經註卷一之四李榮染字號計八卷道德真經集義大㫖三卷道徳真經集義卷一之五詩字號計六卷道德真經集義卷六之十一讃字號計六卷道德真經集義卷十二之十七羔字號計十卷道德真經廣聖義卷一之十羊字號計十三卷道德真經廣聖義卷十一之二十四景字號計十三卷道徳真經廣聖義卷二十五之三十七行字號計十三卷道徳真經廣聖義卷三十八之五十維字號計十卷西昇經集註卷一之大韋處玄文始真經註卷一之四牛道淳賢字號計十四卷文始真經註卷五之九牛道淳文始真經言外㫖卷一之九陳顯微剋字號計八卷沖虛至徳真經口義卷一之八林希𨓜念字號計九卷沖虛至徳真經解卷一之十江道作字號計十六卷沖虛至德真經解卷十一之二十江道沖虚至德真經義解卷一之六政和聖字號計十一卷沖虚至德真經四解卷一之十一徳字號計十一卷沖虛至德真經四解卷十二之二十沖虛至徳真